name: Update StockLayer data

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stocklayer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update StockLayer data
        run: python automation/update_stocklayer.py

      - name: Commit updated JSON
        run: |
          git config user.name "stocklayer-bot"
          git config user.email "stocklayer-bot@users.noreply.github.com"
          git add companies.json companies history
          git commit -m "Update StockLayer data" || echo "No changes to commit"
          git push
