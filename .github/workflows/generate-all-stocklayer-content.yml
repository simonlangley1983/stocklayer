name: Generate All StockLayer Content

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-all-stocklayer-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update StockLayer market data
        run: python automation/update_stocklayer.py

      - name: Generate AI summaries
        run: python automation/generate_ai_summaries.py

      - name: Generate risk profiles
        run: python automation/generate_risk_profiles.py

      - name: Generate leadership profiles
        run: python automation/generate_leadership_profiles.py

      - name: Generate events
        run: python automation/generate_events.py

      - name: Commit generated content
        run: |
          git config user.name "stocklayer-bot"
          git config user.email "stocklayer-bot@users.noreply.github.com"

          git add companies.json
          git add companies
          git add history
          git add ai
          git add risk
          git add leadership
          git add events

          git commit -m "Generate StockLayer content" || echo "No changes to commit"
          git push
